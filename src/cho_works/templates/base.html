<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }} - Cho Works</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/static/img/parrot-icon-32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/static/img/parrot-icon-180.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/static/img/parrot-icon-192.png">
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f7f4;
      --ink: #222624;
      --muted: #66706b;
      --line: #d9ddd7;
      --accent: #2f6f5e;
      --blue: #2356d7;
      --sky: #eaf2ff;
      --green: #27a769;
      --yellow: #f5c542;
      --coral: #f06f5f;
      --accent-ink: #ffffff;
      --panel: #ffffff;
      --warn: #8a5a18;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.55;
    }
    header {
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }
    nav {
      max-width: 1120px;
      margin: 0 auto;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    nav strong { font-size: 18px; }
    .brand-trigger {
      padding: 0;
      color: var(--ink);
      text-decoration: none;
    }
    .brand-trigger:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 4px;
    }
    .nav-links {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    nav a {
      color: var(--muted);
      text-decoration: none;
      font-size: 14px;
    }
    nav a[draggable="true"] {
      cursor: grab;
      user-select: none;
    }
    nav a.dragging {
      opacity: .42;
    }
    nav a.drag-over {
      color: var(--accent);
      box-shadow: inset 0 -2px 0 var(--accent);
    }
    .side-dock-target {
      position: fixed;
      top: 92px;
      right: 14px;
      z-index: 29;
      width: 180px;
      min-height: 220px;
      display: grid;
      place-items: center;
      padding: 14px;
      border: 1px dashed var(--accent);
      border-radius: 8px;
      background: rgba(238, 243, 240, .94);
      color: var(--accent);
      font-size: 13px;
      text-align: center;
      opacity: 0;
      pointer-events: none;
      transform: translateX(8px);
      transition: opacity .14s ease, transform .14s ease, background .14s ease;
    }
    body.nav-dragging .side-dock-target {
      opacity: 1;
      pointer-events: auto;
      transform: translateX(0);
    }
    .side-dock-target.drag-over {
      background: #e3efe9;
      border-style: solid;
    }
    .side-panel {
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      z-index: 40;
      width: min(520px, 44vw);
      display: none;
      flex-direction: column;
      border-left: 1px solid var(--line);
      background: var(--panel);
      box-shadow: -18px 0 42px rgba(34, 38, 36, .16);
    }
    body.side-panel-open .side-panel {
      display: flex;
    }
    body.side-panel-open main {
      margin-right: min(540px, 46vw);
    }
    .side-panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      background: #f8faf7;
    }
    .side-panel-title {
      font-weight: 700;
      font-size: 14px;
    }
    .side-panel-frame {
      width: 100%;
      height: 100%;
      border: 0;
      background: var(--bg);
    }
    .side-panel-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .side-panel-actions a,
    .side-panel-actions button {
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 5px 9px;
      background: #fff;
      color: var(--accent);
      font-size: 12px;
      text-decoration: none;
    }
    .easter-egg-modal[hidden] {
      display: none;
    }
    .easter-egg-modal {
      position: fixed;
      inset: 0;
      z-index: 60;
      display: grid;
      place-items: center;
      padding: 20px;
      background: rgba(34, 38, 36, .28);
    }
    .easter-egg-card {
      width: min(420px, 100%);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      background: var(--panel);
      box-shadow: 0 22px 58px rgba(34, 38, 36, .22);
    }
    .easter-egg-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }
    .easter-egg-title {
      margin: 0;
      font-size: 18px;
    }
    .easter-egg-message {
      min-height: 54px;
      margin: 10px 0 14px;
      font-size: 17px;
      font-weight: 700;
      color: var(--accent);
    }
    .easter-egg-note {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 13px;
    }
    .easter-egg-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    body.embedded header,
    body.embedded .side-dock-target,
    body.embedded .side-panel {
      display: none;
    }
    body.embedded main {
      max-width: none;
      padding: 16px;
      margin: 0;
    }
    main {
      max-width: 1120px;
      margin: 0 auto;
      padding: 24px 20px 48px;
    }
    h1, h2 { margin: 0 0 12px; }
    section {
      margin-bottom: 28px;
    }
    .grid {
      display: grid;
      grid-template-columns: minmax(0, 1.4fr) minmax(280px, 0.6fr);
      gap: 20px;
      align-items: start;
    }
    .panel, .entry, .metric, .work-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
    }
    textarea, input, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 10px 12px;
      font: inherit;
      background: #fff;
    }
    textarea { min-height: 120px; resize: vertical; }
    label {
      display: block;
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 14px;
    }
    button, .button {
      display: inline-block;
      border: 0;
      border-radius: 6px;
      padding: 10px 14px;
      background: var(--accent);
      color: var(--accent-ink);
      font: inherit;
      text-decoration: none;
      cursor: pointer;
    }
    .button.secondary {
      background: #eef3f0;
      color: var(--accent);
      border: 1px solid #cbd9d3;
    }
    .row {
      display: grid;
      grid-template-columns: 150px 1fr;
      gap: 10px;
    }
    .row.three {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }
    .task-card-form textarea {
      min-height: 96px;
    }
    .muted { color: var(--muted); }
    .entry { margin-bottom: 10px; }
    .entry time { color: var(--muted); font-size: 14px; }
    .entry-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }
    .section-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 12px;
    }
    .text-link {
      color: var(--accent);
      text-decoration: none;
      font-size: 13px;
    }
    .pagination {
      max-width: none;
      margin: 14px 0 0;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 6px;
      flex-wrap: wrap;
    }
    .pagination-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 34px;
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel);
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      text-decoration: none;
    }
    .pagination-link:hover,
    .pagination-link.active {
      border-color: var(--accent);
      background: #eef3f0;
      color: var(--accent);
    }
    .page-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }
    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .project-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 12px;
    }
    .project-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
      display: grid;
      gap: 8px;
    }
    .project-card h2,
    .project-card p,
    .project-title p {
      margin: 0;
    }
    .project-link {
      color: var(--ink);
      text-decoration: none;
    }
    .project-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .project-meta span {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 3px 9px;
      color: var(--muted);
      font-size: 12px;
      background: #fafbf9;
    }
    .compact-form {
      margin-top: 8px;
    }
    .empty-state {
      border: 1px dashed var(--line);
      border-radius: 8px;
      padding: 20px;
      background: rgba(255,255,255,.55);
    }
    .project-detail {
      grid-template-columns: minmax(0, 1fr) minmax(260px, .45fr);
    }
    .project-profile {
      margin-bottom: 20px;
    }
    .project-profile-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 12px;
    }
    .profile-wide {
      grid-column: 1 / -1;
    }
    .project-profile-grid article {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #fbfcfa;
    }
    .project-profile-grid h3 {
      margin: 0 0 10px;
      font-size: 15px;
    }
    .profile-list {
      display: grid;
      gap: 8px;
      margin: 0;
    }
    .profile-list dt {
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
    }
    .profile-list dd {
      margin: 0;
    }
    .profile-extra {
      margin-top: 12px;
    }
    .tall-textarea {
      min-height: 220px;
    }
    .competency-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 14px;
      margin: 12px 0;
    }
    .competency-column {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      background: #fbfcfa;
    }
    .competency-column h3 {
      margin: 0 0 12px;
      font-size: 16px;
    }
    .competency-column textarea {
      min-height: 96px;
    }
    .competency-summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 12px;
    }
    .competency-summary > p:first-child {
      margin: 0 0 8px;
    }
    .competency-section {
      border-top: 1px solid var(--line);
      margin-top: 12px;
      padding-top: 12px;
    }
    .competency-section h4 {
      margin: 0 0 8px;
      font-size: 13px;
      color: var(--accent);
      letter-spacing: 0;
    }
    .competency-item {
      display: grid;
      gap: 6px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: #fbfcfa;
    }
    .competency-item + .competency-item {
      margin-top: 8px;
    }
    .competency-item p {
      margin: 0;
      white-space: pre-wrap;
    }
    .daily-group {
      border-top: 1px solid var(--line);
      padding: 14px 0;
    }
    .daily-group h3 {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 14px;
    }
    .daily-entry {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 8px;
    }
    .daily-entry p {
      margin: 0;
    }
    .raw-text {
      white-space: pre-wrap;
    }
    .raw-original {
      margin-top: 12px;
      border-top: 1px solid var(--line);
      padding-top: 10px;
    }
    .raw-original summary {
      color: var(--muted);
      cursor: pointer;
      font-size: 13px;
      width: fit-content;
    }
    .raw-original .raw-text {
      margin-bottom: 0;
    }
    .summary-source {
      margin-bottom: 20px;
    }
    .report-overview h2,
    .report-breakdown h2 {
      margin-bottom: 10px;
    }
    .report-metrics {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 10px;
    }
    .report-metric {
      margin: 0;
      min-height: 84px;
    }
    .report-columns {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
    }
    .report-panel,
    .report-section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
    }
    .report-panel h3,
    .report-section h3 {
      margin: 0 0 10px;
      font-size: 15px;
    }
    .report-sections {
      display: grid;
      gap: 12px;
    }
    .report-section p {
      margin: 0 0 8px;
    }
    .report-section ul {
      margin: 0;
      padding-left: 18px;
    }
    .report-section li + li {
      margin-top: 6px;
    }
    .report-item-card.structured {
      display: grid;
      gap: 8px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfa;
      list-style: none;
    }
    .report-item-card.structured strong {
      color: var(--ink);
    }
    .report-item-summary {
      display: grid;
      grid-template-columns: 42px minmax(0, 1fr);
      gap: 8px;
      color: var(--muted);
      font-size: 14px;
    }
    .report-item-summary b,
    .report-evidence-label {
      color: var(--accent);
      font-size: 12px;
    }
    .report-section .report-evidence-list {
      margin: 0;
      padding-left: 18px;
      color: var(--ink);
      font-size: 14px;
    }
    .bar-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      margin-bottom: 10px;
      color: var(--muted);
      font-size: 13px;
    }
    .bar-row span,
    .bar-row strong {
      min-width: 0;
    }
    .bar-row i {
      grid-column: 1 / -1;
      display: block;
      height: 6px;
      min-width: 8px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--accent), var(--green));
    }
    .report-editor {
      min-height: 420px;
    }
    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }
    .records-table {
      width: 100%;
      border-collapse: collapse;
      min-width: 720px;
    }
    .records-table th,
    .records-table td {
      border-bottom: 1px solid var(--line);
      padding: 10px 12px;
      text-align: left;
      vertical-align: top;
      font-size: 14px;
    }
    .records-table th {
      color: var(--muted);
      background: #fafbf9;
      font-weight: 600;
    }
    .records-table tr:last-child td {
      border-bottom: 0;
    }
    .prompt-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 12px;
    }
    .prompt-card textarea {
      min-height: 180px;
    }
    pre {
      white-space: pre-wrap;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
    }
    .pet {
      position: relative;
      overflow: hidden;
      min-height: 260px;
      color: #10251d;
      background:
        radial-gradient(circle at 80% 8%, rgba(245, 197, 66, .35), transparent 24%),
        linear-gradient(145deg, #f8fff8, #e8f6ff);
      border-color: #c7ded0;
    }
    .parrot-stage {
      display: grid;
      grid-template-columns: 128px 1fr;
      gap: 16px;
      align-items: center;
    }
    .parrot {
      width: 128px;
      height: 148px;
      position: relative;
      margin: 0 auto;
      animation: perch 3.8s ease-in-out infinite;
    }
    .parrot-icon {
      width: 128px;
      height: 128px;
      object-fit: contain;
      border-radius: 28px;
      position: relative;
      z-index: 2;
      filter: drop-shadow(0 14px 18px rgba(18, 73, 52, .18));
    }
    .parrot-icon + .tail,
    .parrot-icon + .tail + .body,
    .parrot-icon + .tail + .body + .wing,
    .parrot-icon + .tail + .body + .wing + .head,
    .parrot-icon + .tail + .body + .wing + .head + .face,
    .parrot-icon + .tail + .body + .wing + .head + .face + .eye,
    .parrot-icon + .tail + .body + .wing + .head + .face + .eye + .beak,
    .parrot-icon + .tail + .body + .wing + .head + .face + .eye + .beak + .perch {
      display: none;
    }
    .parrot .body {
      position: absolute;
      left: 30px;
      top: 46px;
      width: 72px;
      height: 88px;
      background: linear-gradient(145deg, var(--green), #087947);
      border-radius: 48% 48% 42% 42%;
      box-shadow: inset -12px -10px 0 rgba(0,0,0,.09);
    }
    .parrot .wing {
      position: absolute;
      left: 50px;
      top: 66px;
      width: 46px;
      height: 54px;
      background: linear-gradient(145deg, #1782d4, #123d94);
      border-radius: 52% 18% 54% 36%;
    }
    .parrot .head {
      position: absolute;
      left: 36px;
      top: 14px;
      width: 58px;
      height: 58px;
      background: linear-gradient(145deg, #31ba70, #128853);
      border-radius: 50%;
      box-shadow: inset -8px -7px 0 rgba(0,0,0,.08);
    }
    .parrot .face {
      position: absolute;
      left: 57px;
      top: 31px;
      width: 28px;
      height: 24px;
      background: #fff6cf;
      border-radius: 50% 50% 42% 42%;
    }
    .parrot .eye {
      position: absolute;
      left: 72px;
      top: 34px;
      width: 6px;
      height: 6px;
      background: #17211d;
      border-radius: 50%;
    }
    .parrot .beak {
      position: absolute;
      left: 84px;
      top: 42px;
      width: 28px;
      height: 18px;
      background: var(--yellow);
      border-radius: 0 90% 60% 0;
      clip-path: polygon(0 0, 100% 45%, 0 100%);
    }
    .parrot .tail {
      position: absolute;
      left: 43px;
      top: 118px;
      width: 34px;
      height: 58px;
      background: linear-gradient(#1a7bc3, #0b4e79);
      border-radius: 0 0 60% 60%;
      transform: rotate(8deg);
      z-index: -1;
    }
    .parrot .perch {
      position: absolute;
      left: 12px;
      top: 138px;
      width: 104px;
      height: 8px;
      border-radius: 999px;
      background: #8a5a35;
    }
    .pet-bubble {
      border: 1px solid rgba(47,111,94,.2);
      border-radius: 8px;
      padding: 14px;
      background: rgba(255,255,255,.72);
    }
    .metrics {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }
    .metric strong { display: block; font-size: 22px; }
    .board-preview, .board {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
    }
    .compact-board {
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px;
    }
    .lane {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fafbf9;
      padding: 10px;
      min-height: 120px;
    }
    .lane h3 { margin: 0; font-size: 14px; color: var(--muted); }
    .lane-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .board-lane-count {
      min-width: 24px;
      border-radius: 999px;
      padding: 1px 7px;
      background: #eef3f0;
      color: var(--accent);
      text-align: center;
      font-size: 12px;
      border: 1px solid #cbd9d3;
    }
    .work-card { padding: 10px; margin-bottom: 8px; }
    .compact-work-card {
      padding: 8px;
      margin-bottom: 6px;
    }
    .compact-card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 4px;
    }
    .compact-card-title {
      margin: 0 0 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: 13px;
    }
    .work-card-editor {
      padding: 16px;
      margin-bottom: 14px;
    }
    .entry-work-list {
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      padding: 8px 0;
      margin: 10px 0;
    }
    .entry-work-item {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      margin: 6px 0;
    }
    .pill {
      display: inline-block;
      border-radius: 999px;
      padding: 2px 8px;
      background: var(--sky);
      color: var(--blue);
      font-size: 12px;
    }
    .status-tag {
      display: inline-block;
      border-radius: 999px;
      padding: 2px 8px;
      margin-right: 6px;
      background: #eef3f0;
      color: var(--accent);
      font-size: 12px;
      border: 1px solid #cbd9d3;
    }
    .card-dates {
      font-size: 12px;
      margin-bottom: 0;
    }
    @keyframes perch {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    .reminder {
      border-left: 4px solid var(--warn);
    }
    @media (max-width: 760px) {
      .grid, .row, .parrot-stage, .metrics, .project-detail { grid-template-columns: 1fr; }
      .row.three { grid-template-columns: 1fr; }
      .page-head { display: block; }
      .page-head .actions { margin-top: 12px; }
      .nav-links { gap: 12px; }
      body.side-panel-open main {
        margin-right: 0;
      }
      body.side-panel-open .side-panel {
        width: auto;
        left: 16px;
        right: 16px;
        top: 72px;
        max-height: calc(100vh - 88px);
      }
      .side-dock-target {
        right: 10px;
        width: 132px;
      }
    }
  </style>
</head>
<body class="{% if request is defined and request.query_params.get('embedded') == '1' %}embedded{% endif %}">
  <header>
    <nav>
      <a class="brand-trigger" href="/" data-easter-egg-trigger="true">
        <strong>Cho Works</strong>
      </a>
      <div class="nav-links" id="nav-links" aria-label="주요 메뉴">
        <a href="/" draggable="true" data-nav-key="today">오늘</a>
        <a href="/entries" draggable="true" data-nav-key="entries">기록</a>
        <a href="/projects" draggable="true" data-nav-key="projects">프로젝트</a>
        <a href="/board" draggable="true" data-nav-key="board">보드</a>
        <a href="/summary/week" draggable="true" data-nav-key="week">주별</a>
        <a href="/summary/month" draggable="true" data-nav-key="month">월별</a>
        <a href="/summary/quarter" draggable="true" data-nav-key="quarter">분기별</a>
        <a href="/summary/year" draggable="true" data-nav-key="year">년별</a>
        <a href="/competency" draggable="true" data-nav-key="competency">역량</a>
        <a href="/prompts" draggable="true" data-nav-key="prompts">프롬프트</a>
        <a href="/reminders" draggable="true" data-nav-key="reminders">알림</a>
      </div>
    </nav>
  </header>
  <div class="side-dock-target" data-side-dock-target="true" aria-hidden="true">오른쪽에 놓으면 옆 창으로 열기</div>
  <aside class="side-panel" id="side-panel" aria-label="옆 창">
    <div class="side-panel-head">
      <span class="side-panel-title" id="side-panel-title">옆 창</span>
      <div class="side-panel-actions">
        <a href="/" id="side-panel-open-full">전체화면</a>
        <button type="button" data-side-panel-close="true">닫기</button>
      </div>
    </div>
    <iframe class="side-panel-frame" id="side-panel-frame" title="옆 창"></iframe>
  </aside>
  <div class="easter-egg-modal" id="easter-egg-modal" role="dialog" aria-modal="true" aria-labelledby="easter-egg-title" hidden>
    <div class="easter-egg-card">
      <div class="easter-egg-head">
        <h2 class="easter-egg-title" id="easter-egg-title">비밀 응원 모드</h2>
        <button class="button secondary" type="button" data-easter-egg-close="true">닫기</button>
      </div>
      <p class="easter-egg-note">Cho Works를 11번 누른 사람에게만 열리는 작은 작전실.</p>
      <p class="easter-egg-message" id="easter-egg-message">오늘의 기록은 짧게, 성과는 선명하게.</p>
      <div class="easter-egg-actions">
        <button type="button" data-easter-egg-reroll="true">다른 응원 뽑기</button>
        <a class="button secondary" href="/">오늘 업무로 돌아가기</a>
      </div>
    </div>
  </div>
  <main>
    {% block content %}{% endblock %}
  </main>
  <script>
    (() => {
      const storageKey = "choWorksNavOrder";
      const panelStorageKey = "choWorksSidePanel";
      const nav = document.getElementById("nav-links");
      if (!nav) return;
      const dockTarget = document.querySelector('[data-side-dock-target="true"]');
      const panel = document.getElementById("side-panel");
      const panelFrame = document.getElementById("side-panel-frame");
      const panelTitle = document.getElementById("side-panel-title");
      const panelOpenFull = document.getElementById("side-panel-open-full");
      const panelClose = document.querySelector('[data-side-panel-close="true"]');
      const isEmbedded = document.body.classList.contains("embedded");

      const links = () => Array.from(nav.querySelectorAll("a[data-nav-key]"));
      const embeddedUrl = (href) => {
        const url = new URL(href, window.location.origin);
        url.searchParams.set("embedded", "1");
        return `${url.pathname}${url.search}${url.hash}`;
      };
      const openSidePanel = (title, href, persist = true) => {
        if (!panel || !panelFrame || !panelTitle || !panelOpenFull || isEmbedded) return;
        panelTitle.textContent = title;
        panelFrame.src = embeddedUrl(href);
        panelOpenFull.href = href;
        document.body.classList.add("side-panel-open");
        if (!persist) return;
        try {
          localStorage.setItem(panelStorageKey, JSON.stringify({ title, href }));
        } catch {
          return;
        }
      };
      const closeSidePanel = () => {
        if (!panelFrame) return;
        document.body.classList.remove("side-panel-open");
        panelFrame.removeAttribute("src");
        try {
          localStorage.removeItem(panelStorageKey);
        } catch {
          return;
        }
      };
      const readOrder = () => {
        try {
          return JSON.parse(localStorage.getItem(storageKey) || "null");
        } catch {
          return null;
        }
      };
      const saveOrder = () => {
        try {
          localStorage.setItem(storageKey, JSON.stringify(links().map((link) => link.dataset.navKey)));
        } catch {
          return;
        }
      };
      const restoreOrder = () => {
        const order = readOrder();
        if (!Array.isArray(order)) return;
        const byKey = new Map(links().map((link) => [link.dataset.navKey, link]));
        order.forEach((key) => {
          const link = byKey.get(key);
          if (link) nav.appendChild(link);
        });
        links()
          .filter((link) => !order.includes(link.dataset.navKey))
          .forEach((link) => nav.appendChild(link));
      };

      restoreOrder();
      if (!isEmbedded) {
        try {
          const savedPanel = JSON.parse(localStorage.getItem(panelStorageKey) || "null");
          if (savedPanel && savedPanel.title && savedPanel.href) {
            openSidePanel(savedPanel.title, savedPanel.href, false);
          }
        } catch {
          closeSidePanel();
        }
      }
      if (panelClose) {
        panelClose.addEventListener("click", () => {
          closeSidePanel();
        });
      }
      if (dockTarget) {
        dockTarget.addEventListener("dragover", (event) => {
          event.preventDefault();
          dockTarget.classList.add("drag-over");
          event.dataTransfer.dropEffect = "move";
        });
        dockTarget.addEventListener("dragleave", () => {
          dockTarget.classList.remove("drag-over");
        });
        dockTarget.addEventListener("drop", (event) => {
          event.preventDefault();
          dockTarget.classList.remove("drag-over");
          const payload = event.dataTransfer.getData("application/x-cho-nav-link");
          if (!payload) return;
          try {
            const item = JSON.parse(payload);
            if (item && item.href && item.title) {
              openSidePanel(item.title, item.href);
            }
          } catch {
            return;
          }
        });
      }
      links().forEach((link) => {
        link.addEventListener("dragstart", (event) => {
          link.classList.add("dragging");
          document.body.classList.add("nav-dragging");
          event.dataTransfer.effectAllowed = "move";
          event.dataTransfer.setData("text/plain", link.dataset.navKey);
          event.dataTransfer.setData(
            "application/x-cho-nav-link",
            JSON.stringify({ href: link.getAttribute("href"), title: link.textContent.trim() })
          );
        });
        link.addEventListener("dragend", () => {
          link.classList.remove("dragging");
          document.body.classList.remove("nav-dragging");
          if (dockTarget) dockTarget.classList.remove("drag-over");
          links().forEach((item) => item.classList.remove("drag-over"));
        });
        link.addEventListener("dragover", (event) => {
          event.preventDefault();
          link.classList.add("drag-over");
          event.dataTransfer.dropEffect = "move";
        });
        link.addEventListener("dragleave", () => {
          link.classList.remove("drag-over");
        });
        link.addEventListener("drop", (event) => {
          event.preventDefault();
          const sourceKey = event.dataTransfer.getData("text/plain");
          const source = nav.querySelector(`[data-nav-key="${sourceKey}"]`);
          if (!source || source === link) return;
          const sourceIndex = links().indexOf(source);
          const targetIndex = links().indexOf(link);
          nav.insertBefore(source, sourceIndex < targetIndex ? link.nextSibling : link);
          saveOrder();
          links().forEach((item) => item.classList.remove("drag-over"));
        });
      });
    })();
    (() => {
      const clickTarget = document.querySelector('[data-easter-egg-trigger="true"]');
      const modal = document.getElementById("easter-egg-modal");
      const message = document.getElementById("easter-egg-message");
      const close = document.querySelector('[data-easter-egg-close="true"]');
      const reroll = document.querySelector('[data-easter-egg-reroll="true"]');
      if (!clickTarget || !modal || !message) return;

      const messages = [
        "오늘의 업무는 작게 쪼개면 이미 반은 끝난 일.",
        "기록 한 줄은 미래의 내가 보내는 감사 메일.",
        "회의가 길어졌다면 산출물 이름부터 붙이기.",
        "완료는 크게, 이슈는 또렷하게, 다음 할 일은 짧게.",
        "지금 남긴 문장이 월간보고의 구명보트.",
        "오늘도 WBS는 조용히 세상을 정리하는 중.",
        "성과는 과장하지 말고, 대신 놓치지 않기.",
      ];
      let clickCount = 0;
      let resetTimer = null;
      let navigationTimer = null;

      const pickMessage = () => {
        message.textContent = messages[Math.floor(Math.random() * messages.length)];
      };
      const openModal = () => {
        clickCount = 0;
        window.clearTimeout(navigationTimer);
        pickMessage();
        modal.hidden = false;
        try {
          localStorage.setItem("choWorksEasterEgg", "found");
        } catch {
          return;
        }
      };
      const closeModal = () => {
        modal.hidden = true;
      };
      clickTarget.addEventListener("click", (event) => {
        event.preventDefault();
        clickCount += 1;
        window.clearTimeout(navigationTimer);
        window.clearTimeout(resetTimer);
        resetTimer = window.setTimeout(() => {
          clickCount = 0;
        }, 4200);
        if (clickCount >= 11) {
          openModal();
          return;
        }
        navigationTimer = window.setTimeout(() => {
          window.location.href = clickTarget.getAttribute("href") || "/";
        }, 320);
      });
      if (close) {
        close.addEventListener("click", closeModal);
      }
      if (reroll) {
        reroll.addEventListener("click", pickMessage);
      }
      modal.addEventListener("click", (event) => {
        if (event.target === modal) {
          closeModal();
        }
      });
      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && !modal.hidden) {
          closeModal();
        }
      });
    })();
    (() => {
      document.querySelectorAll('input[type="date"][data-open-date-picker="true"]').forEach((input) => {
        const openPicker = () => {
          if (typeof input.showPicker === "function") {
            try {
              input.showPicker();
            } catch {
              return;
            }
          }
        };
        input.addEventListener("click", openPicker);
        input.addEventListener("focus", openPicker);
      });
    })();
  </script>
</body>
</html>
